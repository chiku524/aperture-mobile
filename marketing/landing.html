<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aperture — bounded deep work</title>
    <meta
      name="description"
      content="Run focus blocks with a clear intent. Optional AI guidance and self-hosted sync. Built for clarity, not noise."
    />
    <!-- Replace with your live site URL (required for social previews). -->
    <link rel="canonical" href="https://YOUR_DOMAIN.example/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://YOUR_DOMAIN.example/" />
    <meta property="og:title" content="Aperture — bounded deep work" />
    <meta
      property="og:description"
      content="Run focus blocks with a clear intent. Optional AI guidance and self-hosted sync."
    />
    <!-- Use absolute URL to og-image.png hosted on this domain (e.g. copy from ../public/). -->
    <meta property="og:image" content="https://YOUR_DOMAIN.example/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aperture — bounded deep work" />
    <meta
      name="twitter:description"
      content="Run focus blocks with a clear intent. Optional AI guidance and self-hosted sync."
    />
    <meta name="twitter:image" content="https://YOUR_DOMAIN.example/og-image.png" />
    <meta name="theme-color" content="#0b0f14" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f14;
        --text: #e8eef7;
        --muted: #8b9bb0;
        --accent: #3dd6c6;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      img.logo {
        width: min(200px, 40vw);
        height: auto;
        border-radius: 20px;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        font-weight: 700;
        margin: 0 0 0.75rem;
      }
      p {
        max-width: 36rem;
        color: var(--muted);
        line-height: 1.6;
        margin: 0 0 2rem;
      }
      a.cta {
        display: inline-block;
        padding: 0.85rem 1.5rem;
        border-radius: 12px;
        background: var(--accent);
        color: #041312;
        font-weight: 700;
        text-decoration: none;
      }
      footer {
        margin-top: 3rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <!-- Point src at your hosted logo URL, or open this file from a server that also serves ../assets/marketing/aperture-logo-mark.png -->
    <img class="logo" src="../assets/marketing/aperture-logo-mark.png" alt="Aperture logo" width="200" height="200" />
    <h1>Aperture</h1>
    <p>Bounded deep work with a clear intent and receipt. Optional AI guidance and self-hosted sync — you stay in control of your data.</p>
    <a class="cta" href="#">Get the app</a>
    <footer>Replace YOUR_DOMAIN placeholders, og:image URL, and the CTA link when you ship.</footer>
  </body>
</html>
